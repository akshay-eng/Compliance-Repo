---
- name: Upgrade Python from 3.12 to 3.13
  hosts: all
  become: true
  gather_facts: false

  tasks:
    - name: Remove any conflicting deadsnakes PPA entries
      shell: |
        rm -f /etc/apt/sources.list.d/deadsnakes*.list
        rm -f /etc/apt/sources.list.d/deadsnakes*.sources
        rm -f /etc/apt/trusted.gpg.d/deadsnakes*
        find /etc/apt/sources.list.d/ -name "*deadsnakes*" -delete
      changed_when: true

    - name: Initial apt-get update
      shell: apt-get update 2>&1
      register: initial_update
      failed_when: false
      changed_when: true

    - name: Show initial update output
      debug:
        var: initial_update.stdout_lines

    - name: Install software-properties-common
      shell: apt-get install -y software-properties-common 2>&1
      register: spc_install
      changed_when: true

    - name: Add deadsnakes PPA
      shell: add-apt-repository -y ppa:deadsnakes/ppa 2>&1
      register: ppa_add
      changed_when: true

    - name: Show PPA add output
      debug:
        var: ppa_add.stdout_lines

    - name: Update apt after adding PPA
      shell: apt-get update 2>&1
      register: ppa_update
      failed_when: false
      changed_when: true

    - name: Show apt update output after PPA
      debug:
        var: ppa_update.stdout_lines

    - name: Install Python 3.13
      shell: apt-get install -y python3.13 python3.13-venv python3.13-dev 2>&1
      register: py_install
      changed_when: true

    - name: Show install output
      debug:
        var: py_install.stdout_lines

    - name: Register python3.13 with update-alternatives
      command: >
        update-alternatives --install /usr/bin/python3 python3
        /usr/bin/python3.13 2

    - name: Set python3.13 as default
      command: update-alternatives --set python3 /usr/bin/python3.13

    - name: Verify Python version
      command: python3 --version
      register: py_version

    - name: Show Python version
      debug:
        var: py_version.stdout
