---
- name: Upgrade Python 3.12 to 3.13 on Ubuntu VM
  hosts: all
  become: true
  become_method: sudo
  become_user: root
  gather_facts: false

  tasks:

    - name: Fix conflicting PPA and install Python 3.13
      shell: |
        set -e

        echo ">>> Removing conflicting deadsnakes PPA files..."
        rm -f /etc/apt/sources.list.d/deadsnakes*.list
        rm -f /etc/apt/sources.list.d/deadsnakes*.sources
        rm -f /etc/apt/trusted.gpg.d/deadsnakes*
        rm -f /usr/share/keyrings/deadsnakes*

        echo ">>> Running apt-get update..."
        apt-get update -y

        echo ">>> Installing software-properties-common..."
        apt-get install -y software-properties-common

        echo ">>> Re-adding deadsnakes PPA..."
        add-apt-repository -y ppa:deadsnakes/ppa

        echo ">>> Updating apt cache after PPA add..."
        apt-get update -y

        echo ">>> Installing Python 3.13..."
        apt-get install -y python3.13 python3.13-venv python3.13-dev

        echo ">>> Done installing."
      changed_when: true

    - name: Register Python versions with update-alternatives
      shell: |
        set -e
        update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.13 313
        update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.12 312
        update-alternatives --set python3 /usr/bin/python3.13
      changed_when: true

    - name: Confirm Python 3.13 is now default
      command: python3 --version
      register: py_result
      changed_when: false

    - name: Show result
      debug:
        msg: "Active default: {{ py_result.stdout }}"
